name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eip
          POSTGRES_PASSWORD: eip
          POSTGRES_DB: eip
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        env:
          DATABASE_URL: postgresql+psycopg://eip:eip@localhost:5432/eip
        run: pytest -v

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive infra
      - name: Validate dev
        working-directory: infra/envs/dev
        run: |
          terraform init -backend=false
          terraform validate

  # TODO(Sprint 3): job "security-scan" (Trivy sur l'image Docker + tflint)
  # TODO(Sprint 5): job "deploy" via OIDC AWS + terraform apply sur main
