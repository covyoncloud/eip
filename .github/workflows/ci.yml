name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -v

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive infra
      - name: Validate dev
        working-directory: infra/envs/dev
        run: |
          terraform init -backend=false
          terraform validate

  # TODO(Sprint 3): job "security-scan" (Trivy sur l'image Docker + tflint)
  # TODO(Sprint 5): job "deploy" via OIDC AWS + terraform apply sur main
